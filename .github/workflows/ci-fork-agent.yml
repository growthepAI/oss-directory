name: ci-fork-agent

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-agent:
    name: PR agent
    runs-on: ubuntu-latest
    if: github.repository == 'growthepAI/oss-directory'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Auto-fix formatting with Prettier
        id: prettier
        run: |
          pnpm prettier:write
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "fixed=false" >> $GITHUB_OUTPUT
          else
            git add -A
            git commit -m "style: auto-fix formatting with prettier"
            git push origin HEAD:${{ github.head_ref }}
            echo "fixed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run validate
        id: validate
        run: |
          set +e
          pnpm validate 2>&1 | tee /tmp/validate_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          {
            echo 'errors<<VALIDATE_EOF'
            cat /tmp/validate_output.txt
            echo VALIDATE_EOF
          } >> $GITHUB_OUTPUT

      - name: AI fix validation errors
        id: ai_fix
        if: steps.validate.outputs.exit_code != '0'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          token: ${{ secrets.GH_PAT || github.token }}
          direct_prompt: |
            Fix the YAML validation errors in this PR.

            Errors from `pnpm validate`:
            ```
            ${{ steps.validate.outputs.errors }}
            ```

            Instructions:
            1. Read each failing file (they are in data/projects/ or data/collections/)
            2. Check the schema at src/resources/schema/project.json or src/resources/schema/collection.json
            3. Fix each error — do not change anything else in the files
            4. Run `pnpm validate` to confirm all errors are resolved
            5. If errors remain, keep fixing until validate passes
            6. Commit all fixed files with message: "fix: resolve validation errors"
            7. Post a PR comment summarising what was fixed and why

      - name: Comment fallback if AI fix failed
        if: always() && steps.validate.outputs.exit_code != '0' && steps.ai_fix.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/validate_output.txt', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Validation Errors',
                '',
                'AI fix was unable to resolve these — fix manually before merging:',
                '',
                '```',
                output,
                '```',
              ].join('\n'),
            });

      - name: Fail if validation errors remain
        if: steps.validate.outputs.exit_code != '0' && steps.ai_fix.outcome != 'success'
        run: exit 1
